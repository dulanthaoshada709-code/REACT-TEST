<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUEEN RASHU MINI - Auto React Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #075E54, #128C7E);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .header {
      background: #25D366;
      padding: 20px;
      text-align: center;
      color: white;
    }
    .header h1 {
      font-size: 24px;
    }
    .content {
      padding: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #075E54;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #25D366;
    }
    button {
      background: #25D366;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background: #128C7E;
    }
    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    .channel-list {
      margin-top: 20px;
    }
    .channel-item {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .channel-info {
      flex: 1;
    }
    .channel-jid {
      font-family: monospace;
      font-size: 12px;
      color: #666;
    }
    .remove-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      width: auto;
    }
    .small {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🤖 QUEEN RASHU MINI</h1>
    <p>Auto React Channel Manager</p>
  </div>
  <div class="content">
    <h3>📢 නව Channel එකක් එකතු කරන්න</h3>
    
    <div class="form-group">
      <label>🔗 WhatsApp Channel Link හෝ JID</label>
      <input type="text" id="channelLink" placeholder="https://whatsapp.com/channel/... හෝ 120363xxxx@newsletter">
      <div class="small">* චැනල් එකේ ලින්ක් එක හෝ JID එක දාන්න</div>
    </div>
    
    <div class="form-group">
      <label>😊 Emojis (කොමාවෙන් වෙන් කරන්න)</label>
      <textarea id="emojis" rows="2" placeholder="❤️,🎉,👍,😎,🥳"></textarea>
      <div class="small">* හිස් කළොත් බොට් එකේ default emojis භාවිතා වෙයි</div>
    </div>
    
    <div class="form-group">
      <label>🎯 React ගණන (එක පෝස්ට් එකකට)</label>
      <input type="number" id="reactionCount" min="1" max="20" value="3">
      <div class="small">* උදා: 3 = එක පෝස්ට් එකකට react 3ක් යනවා (උපරිම 20)</div>
    </div>
    
    <button id="submitBtn">➕ Channel Follow කරන්න</button>
    <div id="status" class="status"></div>
    
    <h3 style="margin-top: 30px;">📋 Follow කරපු Channels</h3>
    <div id="channelList" class="channel-list">
      <div>Loading...</div>
    </div>
  </div>
</div>

<script>
  async function loadChannels() {
    try {
      const res = await fetch('/newsletter/list');
      const data = await res.json();
      const listDiv = document.getElementById('channelList');
      if (data.list && data.list.length > 0) {
        listDiv.innerHTML = data.list.map(ch => `
          <div class="channel-item">
            <div class="channel-info">
              <div><strong>📢 ${ch.jid}</strong></div>
              <div>😊 ${ch.emojis && ch.emojis.length ? ch.emojis.join(' ') : 'Default emojis'}</div>
              <div class="channel-jid">🎯 React ගණන: ${ch.reactionCount || 1}</div>
            </div>
            <button class="remove-btn" onclick="removeChannel('${ch.jid}')">❌ Remove</button>
          </div>
        `).join('');
      } else {
        listDiv.innerHTML = '<div>🔴 තවම channel එකක් follow කරලා නැහැ.</div>';
      }
    } catch (err) {
      console.error(err);
      document.getElementById('channelList').innerHTML = '<div>⚠️ Error loading channels</div>';
    }
  }

  async function removeChannel(jid) {
    if (!confirm(`චැනල් එක unfollow කරන්නද?\n${jid}`)) return;
    try {
      const res = await fetch('/newsletter/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jid })
      });
      if (res.ok) {
        loadChannels();
        showStatus('✅ Channel unfollow කරන ලදී', 'success');
      } else {
        showStatus('❌ Failed to remove', 'error');
      }
    } catch (err) {
      showStatus('❌ Error: ' + err.message, 'error');
    }
  }

  async function resolveChannelLink(link) {
    if (link.endsWith('@newsletter')) return link;
    const match = link.match(/whatsapp\.com\/channel\/([\w-]+)/);
    if (!match) throw new Error('Invalid channel link format');
    const res = await fetch(`/resolve-channel?link=${encodeURIComponent(link)}`);
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err || 'Failed to resolve channel');
    }
    const data = await res.json();
    if (!data.jid) throw new Error('Channel not found');
    return data.jid;
  }

  function showStatus(msg, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = msg;
    statusDiv.className = 'status ' + type;
    setTimeout(() => {
      statusDiv.style.display = 'none';
      statusDiv.className = 'status';
    }, 5000);
    statusDiv.style.display = 'block';
  }

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const link = document.getElementById('channelLink').value.trim();
    const emojisRaw = document.getElementById('emojis').value.trim();
    const reactionCount = parseInt(document.getElementById('reactionCount').value) || 1;
    
    if (!link) {
      showStatus('කරුණාකර channel link එකක් හෝ JID එකක් ඇතුලත් කරන්න', 'error');
      return;
    }
    
    const emojis = emojisRaw ? emojisRaw.split(',').map(e => e.trim()).filter(e => e) : [];
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Processing...';
    
    try {
      const jid = await resolveChannelLink(link);
      const res = await fetch('/newsletter/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jid, emojis, reactionCount: Math.min(reactionCount, 20) })
      });
      if (res.ok) {
        showStatus(`✅ සාර්ථකයි! ${jid} channel එක follow කරන ලදී.`, 'success');
        document.getElementById('channelLink').value = '';
        document.getElementById('emojis').value = '';
        document.getElementById('reactionCount').value = '3';
        loadChannels();
      } else {
        const err = await res.text();
        showStatus('❌ ' + err, 'error');
      }
    } catch (err) {
      showStatus('❌ ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '➕ Channel Follow කරන්න';
    }
  });
  
  loadChannels();
</script>
</body>
</html>
